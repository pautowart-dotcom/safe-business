# Домен business-safe.ru зарегистрирован владельцем (Timeweb) — переезд с
# голого IP. Схема: business-safe.ru — лендинг, app.business-safe.ru —
# клиентское приложение (SPA + API), admin.business-safe.ru — кабинет
# платформы (Задача 1) — отдельный интерфейс для владельца (компании,
# метрики, поддержка), намеренно не смешан с клиентским кабинетом.
#
# Сертификаты — через `certbot certonly --nginx`,
# НЕ через `certbot --nginx` — тот сам переписывает этот файл, а deploy.sh
# каждый раз перезаписывает /etc/nginx/sites-available из репозитория,
# и правки certbot потерялись бы при следующем деплое. certonly только
# выпускает/обновляет файлы сертификата по путям ниже — сам nginx.conf
# остаётся источником истины в git.
#
# При добавлении admin.business-safe.ru нужно РАСШИРИТЬ существующий
# сертификат (не выпускать отдельный):
#   certbot certonly --nginx -d business-safe.ru -d www.business-safe.ru \
#     -d app.business-safe.ru -d admin.business-safe.ru
# — плюс новая A-запись admin.business-safe.ru → тот же IP в Timeweb.

server {
    listen 80;
    server_name business-safe.ru www.business-safe.ru;
    return 301 https://business-safe.ru$request_uri;
}

server {
    listen 443 ssl;
    server_name business-safe.ru www.business-safe.ru;

    ssl_certificate     /etc/letsencrypt/live/business-safe.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/business-safe.ru/privkey.pem;

    # До официального запуска — запрет индексации на уровне HTTP-заголовка
    # (надёжнее <meta name="robots">, работает и для файлов без самого
    # тега). Убрать вместе с noindex в landing/index.html и robots.txt,
    # когда продукт готов к публичному поиску.
    add_header X-Robots-Tag "noindex, nofollow" always;

    root /var/www/safe-business/landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name app.business-safe.ru;
    return 301 https://app.business-safe.ru$request_uri;
}

server {
    listen 443 ssl;
    server_name app.business-safe.ru;

    ssl_certificate     /etc/letsencrypt/live/business-safe.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/business-safe.ru/privkey.pem;

    # До официального запуска — см. комментарий в блоке business-safe.ru выше.
    add_header X-Robots-Tag "noindex, nofollow" always;

    root /var/www/safe-business/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri /index.html;
    }

    # 8M — под загрузку фото визита/документа (multer лимит в
    # core/uploads.js согласован с этим значением, см. Этап 4 и баг из
    # раздела "Документы").
    client_max_body_size 8M;
}

server {
    listen 80;
    server_name admin.business-safe.ru;
    return 301 https://admin.business-safe.ru$request_uri;
}

server {
    listen 443 ssl;
    server_name admin.business-safe.ru;

    ssl_certificate     /etc/letsencrypt/live/business-safe.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/business-safe.ru/privkey.pem;

    # Двойная защита от индексации и от случайного обнаружения: noindex
    # (см. комментарии выше) — этого мало для админки, поэтому дальше ещё
    # requireSuperAdmin на каждом /api/platform/admin/* эндпоинте (не
    # полагаемся только на "спрятанный" поддомен).
    add_header X-Robots-Tag "noindex, nofollow" always;

    root /var/www/safe-business/admin-frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri /index.html;
    }
}

# Временно оставлено для обратной совместимости, пока DNS/переход не
# завершён — переводит заход по голому IP на новый домен. Убрать, когда
# все ссылки (приглашения и т.п.) точно уедут на новый домен.
server {
    listen 80 default_server;
    server_name 104.171.137.253;
    return 301 https://app.business-safe.ru$request_uri;
}
